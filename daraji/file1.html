<!DOCTYPE html>
<html lang = "ko">
<head>
    <meta charset="UTF-8">
    <title>31</title>
</head>
<style>
    button {
        font-size: 24px;   /* 글씨 크기 */
        padding: 15px 30px; /* 안쪽 여백 → 버튼 커짐 */
    }
    #counter {
        font-size: 40px;  /* 글씨 크기 */
        font-weight: bold; /* 두껍게 */
        margin-bottom: 20px; /* 버튼과 간격 */
    }
</style>
<body>
    <div id="counter">0 / 10</div>
    <button onclick="ButtonClick()">물 주기</button>
</body>
<script>
    let count = 0;
    let maxCount = 10;

    function ButtonClick(){
        count++;
        document.getElementById("counter").innerText = count + " / " + maxCount;
        if(count == maxCount + 1){
            alert("끝");
        }
    }    
</script>
</html>
