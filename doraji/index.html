<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도라지 가챠 클릭커</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="login-section">
        <button class="big-btn" onclick="Login()">구글 로그인</button>
        <span id="user-info"></span>
        <button onclick="Logout()" style="display:none;" id="logout-btn">로그아웃</button>
    </div>

    <div id="game-section" style="display:none;">
        <div id="left">
            <div id="counter">0 / 10</div>

            <div id="bar-container">
                <div id="bar"></div>
            </div>

            <button class="big-btn" onclick="ButtonClick()">물 주기</button>
        </div>

        <div id="right">
            <div id="collection"></div>
        </div>
    </div>
    
    <script type="module" src="main.js"></script>

    <div id="popup" style="
        display:none;
        position:fixed;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        background:white;
        padding:20px;
        border-radius:10px;
        text-align:center;
        box-shadow:0 0 20px rgba(0,0,0,0.3);
    ">
    <img id="popup-img" width="150"><br>
    <div id="popup-text"></div>
</div>
</body>
</html>
