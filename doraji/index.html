<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도라지 가챠 클릭커</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="top-bar">
        <button id="login-btn" class="big-btn" onclick="Login()">구글 로그인</button>

        <div id="user-menu" style="display:none;">
            <span id="user-info"></span>
            <button onclick="Logout()" id="logout-btn">로그아웃</button>
            <button onclick="OpenMarketModal()">장터</button>
            <span>골드: <span id="gold-text">0</span></span>
        </div>
    </div>

    <div id="main-layout">
        <div id="friend-section" style="display:none;">
            <h3>친구</h3>

            <div>
                내 친구코드: <span id="my-friend-code"></span>
            </div>

            <input type="text" id="friend-code-input" placeholder="친구코드 입력">
            <button onclick="SendFriendRequest()">친구 요청 보내기</button>

            <h4>받은 친구 요청</h4>
            <div id="friend-request-list"></div>

            <h4>친구 목록</h4>
            <div id="friend-list"></div>

            <h4>받은 교환 요청</h4>
            <div id="trade-request-list"></div>

            <h4>진행 중인 교환</h4>
            <div id="active-trade-list"></div>
        </div>

        <div id="game-section" style="display:none;">
            <div id="left">
                <div id="counter">0 / 10</div>

                <div id="bar-container">
                    <div id="bar"></div>
                </div>

                <button class="big-btn" onclick="ButtonClick()">물 주기</button>
            </div>

            <div id="right">
                <div id="collection"></div>
            </div>
        </div>
    </div>

    <div id="popup" style="
        display:none;
        position:fixed;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        background:white;
        padding:20px;
        border-radius:10px;
        text-align:center;
        box-shadow:0 0 20px rgba(0,0,0,0.3);
    ">
        <img id="popup-img" width="150"><br>
        <div id="popup-text"></div>
    </div>

    <div id="trade-modal" style="display:none;">
        <div id="trade-modal-content">
            <div id="trade-modal-header">
                <span id="trade-modal-title">교환창</span>
                <button onclick="CloseTradeModal()">X</button>
            </div>
            <div id="trade-my-item-list"></div>
            <div id="trade-modal-body">
                <div class="trade-panel">
                    <h3>내 거래 (우클릭으로 1개 제거)</h3>
                    <div id="my-trade-slots" class="trade-slots"></div>
                    <div id="my-trade-lock-state">대기 중</div>
                </div>

                <div class="trade-center">↔</div>

                <div class="trade-panel">
                    <h3>상대 거래</h3>
                    <div id="other-trade-slots" class="trade-slots"></div>
                    <div id="other-trade-lock-state">대기 중</div>
                </div>
            </div>

            <div id="trade-modal-footer">
                <button onclick="LockCurrentTrade()">확인</button>
                <button onclick="CancelCurrentTrade()">취소</button>
            </div>
        </div>
    </div>

    <div id="market-modal" style="display:none;">
        <div id="market-modal-content">
            <div id="market-modal-header">
                <span>장터</span>
                <button onclick="CloseMarketModal()">X</button>
            </div>

            <div id="market-register">
                <h3>판매 등록</h3>
                <div id="market-my-items"></div>
            </div>

            <div id="market-list-section">
                <h3>판매 목록</h3>
                <div id="market-controls">
                    <input type="text" id="market-search" placeholder="도라지 이름 검색">
    
                    <select id="market-sort">
                        <option value="latest">최신순</option>
                        <option value="low">가격 낮은순</option>
                        <option value="high">가격 높은순</option>
        3           </select>

                    <select id="market-grade-filter">
                        <option value="all">전체 등급</option>
                        <option value="common">common</option>
                        <option value="rare">rare</option>
                        <option value="epic">epic</option>
                        <option value="superRare">superRare</option>
                    </select>

                    <label>
                        <input type="checkbox" id="market-my-items-only">
                        내가 올린 글만
                    </label>

                    <label>
                        <input type="checkbox" id="market-affordable-only">
                        내가 살 수 있는 가격만
                    </label>
                </div>
                <div id="market-list"></div>
                <div id="market-pagination">
                    <button id="market-prev-page">이전</button>
                    <span id="market-page-info">1 / 1</span>
                    <button id="market-next-page">다음</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
